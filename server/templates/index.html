<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Camera Tracking Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Multi-Camera Tracking Control</h1>
        
        <div class="global-controls">
            <h2>Global Controls</h2>
            <div class="global-button-row">
                <button class="btn-primary" onclick="centerAllServos()">Center All Servos</button>
                <button class="btn-secondary" onclick="enableAllTracking()">Enable All Tracking</button>
                <button class="btn-secondary" onclick="disableAllTracking()">Disable All Tracking</button>
                <button id="autoFocusButton" class="btn-secondary" onclick="toggleAutoFocus()">Auto-Focus Best Score: Off</button>
                <button class="btn-secondary" onclick="setAllDrawSkeleton(true)">Show All Skeletons</button>
                <button class="btn-secondary" onclick="setAllDrawSkeleton(false)">Hide All Skeletons</button>
                <button class="btn-secondary" onclick="setAllDrawStats(true)">Show All Stats</button>
                <button class="btn-secondary" onclick="setAllDrawStats(false)">Hide All Stats</button>
            </div>
            <div class="autofocus-controls">
                <div class="autofocus-control">
                    <label for="autoFocusThreshold">Switch Threshold: <span id="autoFocusThresholdValue">0.10</span></label>
                    <input id="autoFocusThreshold" type="range" min="0" max="1" step="0.01" value="0.10"
                           oninput="updateAutoFocusThreshold(this.value)">
                </div>
                <div class="autofocus-control">
                    <label for="autoFocusCooldown">Switch Cooldown: <span id="autoFocusCooldownValue">3.0s</span></label>
                    <input id="autoFocusCooldown" type="range" min="0" max="10" step="0.5" value="3"
                           oninput="updateAutoFocusCooldown(this.value)">
                </div>
            </div>
        </div>
        
        <div id="cameraGrid" class="camera-grid">
            <div class="no-cameras">Waiting for cameras to connect...</div>
        </div>
    </div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
